services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - '27017:27017'
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - mongodb_data:/data/db
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  company-a:
    build:
      context: .
      dockerfile: services/company-service/Dockerfile.dev
    image: hr-company-api-dev:latest
    container_name: company-a-dev
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=development
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/company_a_db
      - COMPANY_ID=A
      - TZ=Asia/Jakarta
      - JWT_SECRET=dev-secret-key-change-in-prod
      - REFRESH_TOKEN_SECRET=dev-refresh-secret-key-change-in-prod
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: >
      sh -c "pnpm run seed && pnpm run dev"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  company-b:
    build:
      context: .
      dockerfile: services/company-service/Dockerfile.dev
    image: hr-company-api-dev:latest
    container_name: company-b-dev
    ports:
      - '3002:3002'
    environment:
      - NODE_ENV=development
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/company_b_db
      - COMPANY_ID=B
      - TZ=Asia/Jakarta
      - JWT_SECRET=dev-secret-key-change-in-prod
      - REFRESH_TOKEN_SECRET=dev-refresh-secret-key-change-in-prod
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: >
      sh -c "pnpm run seed && pnpm run dev"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  attendance:
    build:
      context: .
      dockerfile: services/attendance/Dockerfile.dev
    image: hr-attendance-dev:latest
    container_name: attendance-dev
    ports:
      - '3003:3003'
    environment:
      - NODE_ENV=development
      - PORT=3003
      - MONGODB_URI=mongodb://mongodb:27017/attendance_db
      - COMPANY_SERVICE_URL=http://company-a:3001
      - TZ=Asia/Jakarta
      - JWT_SECRET=dev-secret-key-change-in-prod
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mongodb:
        condition: service_healthy
      company-a:
        condition: service_started
    entrypoint: >
      sh -c "pnpm run seed && pnpm run dev"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: api-gateway-dev
    ports:
      - '80:80'
    depends_on:
      company-a:
        condition: service_started
      company-b:
        condition: service_started
      attendance:
        condition: service_started
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - /etc/localtime:/etc/localtime:ro

volumes:
  mongodb_data: