services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - '27017:27017'
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - mongodb_data:/data/db
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  company-a:
    build:
      context: .
      dockerfile: services/company-service/Dockerfile
    image: hr-company-api:latest
    container_name: company-a
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/company_a_db
      - COMPANY_ID=A
      - TZ=Asia/Jakarta
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-your-refresh-secret-key-here}
      - RATE_LIMIT_ENABLED=false
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  company-b:
    build:
      context: .
      dockerfile: services/company-service/Dockerfile
    image: hr-company-api:latest
    container_name: company-b
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/company_b_db
      - COMPANY_ID=B
      - TZ=Asia/Jakarta
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-your-refresh-secret-key-here}
      - RATE_LIMIT_ENABLED=false
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  attendance:
    build:
      context: .
      dockerfile: services/attendance/Dockerfile
    image: hr-attendance:latest
    container_name: attendance
    expose:
      - "3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - MONGODB_URI=mongodb://mongodb:27017/attendance_db
      - COMPANY_A_SERVICE_URL=http://company-a:3001
      - COMPANY_B_SERVICE_URL=http://company-b:3002
      - TZ=Asia/Jakarta
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mongodb:
        condition: service_healthy
      company-a:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "80:80"
    depends_on:
      company-a:
        condition: service_started
      company-b:
        condition: service_started
      attendance:
        condition: service_started
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - /etc/localtime:/etc/localtime:ro

volumes:
  mongodb_data:
