services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  company-a:
    image: hr-company-api:latest
    container_name: company-a
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/company_a_db
      - COMPANY_ID=A
    depends_on:
      mongodb:
        condition: service_healthy

  company-b:
    image: hr-company-api:latest
    container_name: company-b
    ports:
      - '3002:3002'
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/company_b_db
      - COMPANY_ID=B
    depends_on:
      mongodb:
        condition: service_healthy

  attendance:
    build:
      context: .
      dockerfile: services/attendance/Dockerfile
    image: hr-attendance:latest
    container_name: attendance
    ports:
      - '3003:3003'
    environment:
      - NODE_ENV=production
      - PORT=3003
      - MONGODB_URI=mongodb://mongodb:27017/attendance_db
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
