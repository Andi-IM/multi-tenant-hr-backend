services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  company-a:
    image: hr-company-api:latest
    container_name: company-a
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/company_a_db
      - COMPANY_ID=A
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  company-b:
    image: hr-company-api:latest
    container_name: company-b
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/company_b_db
      - COMPANY_ID=B
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  attendance:
    build:
      context: .
      dockerfile: services/attendance/Dockerfile
    image: hr-attendance:latest
    container_name: attendance
    expose:
      - "3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - MONGODB_URI=mongodb://mongodb:27017/attendance_db
      - COMPANY_SERVICE_URL=http://company-a:3001
    depends_on:
      mongodb:
        condition: service_healthy
      company-a:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: api-gateway
    ports:
      - "80:80"
    depends_on:
      company-a:
        condition: service_started
      company-b:
        condition: service_started
      attendance:
        condition: service_started

volumes:
  mongodb_data:
