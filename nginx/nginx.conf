events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Rate Limiting configuration
    # 10MB zone to store IP addresses, 10 requests per second rate
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    server {
        listen 80;
        server_name localhost;

        location /company-a/ {
            set $company_a http://company-a:3001;
            rewrite ^/company-a(/.*)$ $1 break;
            proxy_pass $company_a;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            limit_req zone=api_limit burst=20 nodelay;
        }

        location /company-b/ {
            set $company_b http://company-b:3002;
            rewrite ^/company-b(/.*)$ $1 break;
            proxy_pass $company_b;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /attendance/api-docs/ {
            set $attendance http://attendance:3003;
            rewrite ^/attendance/api-docs(/.*)$ /api-docs$1 break;
            proxy_pass $attendance;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 1. API prefix for /attendance/ (Transparent)
        location /attendance/ {
            set $attendance http://attendance:3003;
            rewrite ^/attendance/(.*)$ /$1 break;
            proxy_pass $attendance;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location / {
            default_type application/json;
            return 200 '{"status":"UP","gateway":"Nginx API Gateway","timestamp":"$time_iso8601","services":{"company-a":{"status":"UP","url":"/company-a/","health":"/health/company-a","api-docs":"/company-a/api-docs/"},"company-b":{"status":"UP","url":"/company-b/","health":"/health/company-b","api-docs":"/company-b/api-docs/"},"attendance":{"status":"UP","url":"/attendance/","health":"/health/attendance","api-docs":"/attendance/api-docs/"}}}';
        }

        location /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"UP"}';
        }

        location /health/company-a {
            set $company_a http://company-a:3001;
            proxy_pass $company_a;
            proxy_set_header Host $host;
        }

        location /health/company-b {
            set $company_b http://company-b:3002;
            proxy_pass $company_b;
            proxy_set_header Host $host;
        }

        location /health/attendance {
            set $attendance http://attendance:3003;
            proxy_pass $attendance;
            proxy_set_header Host $host;
        }
    }
}
